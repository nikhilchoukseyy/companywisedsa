<!doctype html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />

    <meta name="theme-color" content="#f59e0b" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Company-Wise DSA" />

    <!-- Title -->
    <title>Company-Wise DSA | LeetCode Company Questions, Online Compiler & Placement Preparation</title>

    <!-- SEO -->
    <meta
      name="description"
      content="Practice company-wise LeetCode questions for FAANG and top tech companies. Track your progress, bookmark problems, solve interview questions, and test solutions with an integrated online compiler."
    />

    <meta
      name="keywords"
      content="Company Wise DSA, LeetCode Company Questions, Coding Interview Preparation, DSA Practice, FAANG Interview Questions, Online Compiler, Placement Preparation, Amazon DSA, Google DSA, Microsoft DSA, Software Engineer Interview, Coding Platform"
    />

    <link rel="canonical" href="https://companywisedsa.vercel.app/" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta
      property="og:title"
      content="Company-Wise DSA | Practice LeetCode Company Questions"
    />
    <meta
      property="og:description"
      content="Prepare for coding interviews with company-wise LeetCode questions, bookmarks, progress tracking, and an integrated online compiler."
    />
    <meta property="og:url" content="https://companywisedsa.vercel.app/" />
    <meta property="og:site_name" content="Company-Wise DSA" />
    <meta property="og:image" content="https://companywisedsa.vercel.app/og-image.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Company-Wise DSA | Practice LeetCode Company Questions"
    />
    <meta
      name="twitter:description"
      content="Master coding interviews with company-wise LeetCode questions, online compiler, and progress tracking."
    />
    <meta name="twitter:image" content="https://companywisedsa.vercel.app/og-image.png" />

    <!-- PWA -->
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Company-Wise DSA",
        "url": "https://companywisedsa.vercel.app",
        "description": "Company-wise LeetCode interview preparation platform with online compiler, bookmarks, progress tracking, and coding interview practice.",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://companywisedsa.vercel.app/companies?search={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>
  </head>

    <div id="root"></div>
